<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <title>Avalon Radio – Calendar</title>
  <style>
    html{
      overflow-x:hidden;
      scrollbar-width:none;
      -ms-overflow-style:none;
    }
    html::-webkit-scrollbar{
      display:none;
    }
    body{
      margin:0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      background:#fff;
      color:#111;
      display:flex;
      flex-direction:column;
      align-items:center;
      min-height:100vh;
      padding:12px 24px 24px;
      box-sizing:border-box;
    }
    h1{
      margin:0 0 12px;
      font-size:1.7rem;
      width:100%;
      display:flex;
      justify-content:flex-end;
      align-items:center;
      max-width:1040px;
      box-sizing:border-box;
    }
    h1 img.site-logo{
      display:block;
      width:330px;
      max-width:100%;
      height:auto;
    }
    p.subtitle{
      margin:0 0 20px;
      color:#555;
      font-size:0.95rem;
    }
    .layout{
      width:100%;
      max-width:1040px;
      display:grid;
      grid-template-columns:1fr 1fr;
      align-items:stretch;
      gap:18px;
      margin-bottom:18px;
    }
    @media (max-width: 840px){
      .layout{
        grid-template-columns:1fr;
      }
    }
    .calendar{
      width:100%;
      background:#fff;
      border-radius:0;
      padding:16px 22px 24px;
      box-sizing:border-box;
      overflow:hidden;
      display:flex;
      flex-direction:column;
      min-height:0;
    }
    .cal-header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      margin-bottom:12px;
      flex-shrink:0;
    }
    .cal-header button{
      border:none;
      background:transparent;
      color:#111;
      border-radius:999px;
      padding:4px 10px;
      font-size:0.85rem;
      cursor:pointer;
      transition:color 0.15s ease, transform 0.15s ease;
      outline:none;
    }
    @media (hover: hover) and (pointer: fine){
      .cal-header button:hover{
        background:transparent;
        color:#d96b1f;
        transform:scale(1.05);
      }
    }
    .cal-header button:active{
      transform:scale(0.98);
    }
    .cal-header button:focus,
    .cal-header button:focus-visible{
      outline:none;
      box-shadow:none;
    }
    .cal-header span{
      font-weight:600;
    }
    .dow{
      display:grid;
      grid-template-columns:repeat(7,1fr);
      font-size:0.8rem;
      text-transform:uppercase;
      color:#888;
      margin-bottom:4px;
      flex-shrink:0;
    }
    .dow div{
      text-align:center;
      padding:4px 0;
    }
    .grid{
      display:grid;
      grid-template-columns:repeat(7,1fr);
      grid-template-rows:repeat(6,1fr);
      row-gap:8px;
      column-gap:6px;
      flex:1;
      min-height:0;
    }
    .day{
      position:relative;
      padding:0.25em 6px 0.5em;
      min-height:0;
      border-radius:0;
      overflow:hidden;
      box-sizing:border-box;
      border:1px solid transparent; /* reserve space so blue border doesn't change row height */
      text-align:left;
      font-size:clamp(0.75rem, 2.5vw, 1.1rem);
      cursor:default;
      color:#999;
      display:flex;
      align-items:center;
      justify-content:flex-start;
    }
    .day.in-month{
      color:#222;
    }
    .day.has-episode{
      cursor:pointer;
      background:var(--ep-bg, #f0f3ff);
      border:1px solid var(--ep-border, #dde3ff);
    }
    .day.has-episode .dot{
      position:absolute;
      bottom:6px;
      left:50%;
      transform:translateX(-50%);
      width:6px;
      height:6px;
      border-radius:50%;
      background:var(--ep-dot, #3333ff);
    }
    .day.today{
      border:1px solid var(--ep-border, #3333ff);
    }
    .day-number{
      font-weight:500;
    }
    .day .live-label{
      position:absolute;
      top:4px;
      right:6px;
      font-size:0.58rem;
      font-weight:700;
      letter-spacing:0.03em;
      color:#d11a2a;
      text-transform:uppercase;
      pointer-events:none;
    }
    .day.has-live{
      cursor:pointer;
      background:rgba(209,26,42,0.08);
      border:1px solid rgba(209,26,42,0.35);
    }
    .day.has-live .day-number{
      color:#d11a2a;
      font-weight:700;
    }
    .month-image{
      width:100%;
      background:#fff;
      border-radius:0;
      padding:0;
      box-sizing:border-box;
      display:flex;
      flex-direction:column;
    }
    .month-image img{
      width:100%;
      height:100%;
      display:block;
      object-fit:cover;
      border-radius:0;
    }
    /* Both cards perfectly square (height = width) */
    .calendar,
    .month-image{
      aspect-ratio: 1 / 1;
    }
    .month-image{
      overflow:hidden;
    }
    .player{
      width:100%;
      max-width:1040px;
      background:#fff;
      border-radius:0;
      padding:16px 18px 18px;
      box-sizing:border-box;
    }
    .episode-title{
      font-size:1rem;
      font-weight:600;
      margin:0 0 4px;
    }
    .episode-date{
      font-size:0.85rem;
      color:#666;
      margin:0 0 10px;
    }
    .episode-description{
      font-size:0.9rem;
      color:#444;
      margin:0 0 12px;
      white-space:pre-wrap;
    }
    .empty{
      font-size:0.9rem;
      color:#777;
    }
    .live-embed-wrap{
      display:none;
      width:calc(100% + 36px);
      margin-left:-18px;
      margin-right:-18px;
      margin-top:10px;
      background:#000;
      border-radius:0;
      overflow:hidden;
      aspect-ratio:16 / 9;
    }
    .live-embed-wrap.visible{
      display:block;
    }
    .live-embed-wrap iframe{
      width:100%;
      height:100%;
      border:0;
    }

    /* Custom sound bar - white background, full width to match cards */
    .sound-bar{
      display:none;
      align-items:center;
      gap:14px;
      background:#fff;
      padding:14px 18px;
      border-radius:0;
      margin-top:12px;
      width:100%;
      max-width:100%;
      box-sizing:border-box;
    }
    .sound-bar.visible{
      display:flex;
    }
    .sound-bar .progress-wrap{
      display:flex;
      align-items:center;
      gap:10px;
      flex:1;
      min-width:0;
    }
    .sound-bar .progress-wrap .time{
      flex-shrink:0;
    }
    .sound-bar .play-btn{
      width:42px;
      height:42px;
      border-radius:50%;
      background:transparent;
      border:2px solid #555;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      color:#555;
      flex-shrink:0;
      transition:transform 0.15s ease, border-color 0.15s ease, color 0.15s ease;
      outline:none;
    }
    @media (hover: hover) and (pointer: fine){
      .sound-bar .play-btn:hover{
        border-color:#d96b1f;
        color:#d96b1f;
        transform:scale(1.05);
      }
    }
    .sound-bar .play-btn:active{
      transform:scale(0.98);
    }
    .sound-bar .play-btn svg{
      width:18px;
      height:18px;
    }
    .sound-bar .icon-btn{
      background:transparent;
      border:none;
      color:#333;
      cursor:pointer;
      padding:6px;
      display:flex;
      align-items:center;
      justify-content:center;
      border-radius:6px;
      transition:color 0.15s ease, transform 0.15s ease;
      outline:none;
    }
    @media (hover: hover) and (pointer: fine){
      .sound-bar .icon-btn:hover{
        color:#d96b1f;
        background:transparent;
        transform:scale(1.05);
      }
    }
    .sound-bar .icon-btn:active{
      transform:scale(0.98);
    }
    .sound-bar .volume-btn:active{
      transform:scale(0.98);
    }
    .sound-bar .icon-btn.active{
      color:#d96b1f;
    }
    .sound-bar .icon-btn svg{
      width:20px;
      height:20px;
    }
    .sound-bar .icon-btn.disabled{
      opacity:0.35;
      cursor:not-allowed;
      pointer-events:none;
    }
    .sound-bar .time{
      font-size:0.85rem;
      color:#444;
      min-width:2.2em;
      font-variant-numeric:tabular-nums;
    }
    .sound-bar.live-mode .time.live-time{
      color:#d11a2a;
      font-weight:700;
      min-width:auto;
    }
    .sound-bar .progress-wrap .progress-range{
      flex:1;
      min-width:0;
      height:6px;
      margin:0;
      -webkit-appearance:none;
      appearance:none;
      background:#e5e5e5;
      border-radius:3px;
      cursor:pointer;
      outline:none;
    }
    .sound-bar .progress-wrap .progress-range:disabled{
      opacity:0.45;
      cursor:not-allowed;
    }
    .sound-bar .progress-range::-webkit-slider-runnable-track{
      height:6px;
      border-radius:3px;
      background:linear-gradient(to right, #d96b1f 0%, #d96b1f var(--pct, 0%), #e5e5e5 var(--pct, 0%), #e5e5e5 100%);
    }
    .sound-bar .progress-range::-moz-range-track{
      height:6px;
      border-radius:3px;
      background:linear-gradient(to right, #d96b1f 0%, #d96b1f var(--pct, 0%), #e5e5e5 var(--pct, 0%), #e5e5e5 100%);
    }
    .sound-bar .progress-range::-webkit-slider-thumb{
      -webkit-appearance:none;
      appearance:none;
      width:14px;
      height:14px;
      border-radius:50%;
      background:#d96b1f;
      cursor:pointer;
      margin-top:-4px;
    }
    .sound-bar .progress-range::-moz-range-thumb{
      width:14px;
      height:14px;
      border-radius:50%;
      background:#d96b1f;
      cursor:pointer;
      border:none;
    }
    .sound-bar .volume-btn{
      background:transparent;
      border:none;
      color:#333;
      cursor:pointer;
      padding:6px;
      border-radius:6px;
      transition:color 0.15s ease, transform 0.15s ease;
      outline:none;
    }
    .sound-bar .play-btn:focus,
    .sound-bar .play-btn:focus-visible,
    .sound-bar .icon-btn:focus,
    .sound-bar .icon-btn:focus-visible,
    .sound-bar .volume-btn:focus,
    .sound-bar .volume-btn:focus-visible,
    .sound-bar .progress-wrap .progress-range:focus,
    .sound-bar .progress-wrap .progress-range:focus-visible{
      outline:none;
      box-shadow:none;
    }
    @media (hover: hover) and (pointer: fine){
      .sound-bar .volume-btn:hover{
        color:#d96b1f;
        background:transparent;
        transform:scale(1.05);
      }
    }
    .sound-bar .volume-btn.muted{
      color:#999;
    }
    .sound-bar .volume-btn svg{
      width:20px;
      height:20px;
    }

    /* Footer contact pills (small text buttons) */
    .site-footer{
      width:100%;
      max-width:1040px;
      padding:14px 0 6px;
      box-sizing:border-box;
      border-top:1px solid rgba(0,0,0,0.06);
      margin-top:auto;
      background:transparent;
      color:#111;
    }
    .footer-pills{
      display:flex;
      flex-wrap:wrap;
      gap:26px;
      justify-content:center;
      align-items:center;
    }
    .footer-pill{
      font-size:0.78rem;
      color:#111;
      text-decoration:none;
      background:#fff;
      border:none;
      padding:2px 0;
      border-radius:0;
      line-height:1.2;
      word-break:break-word;
    }
    @media (hover: hover) and (pointer: fine){
      .footer-pill:not(.footer-text):hover{
        color:#d96b1f;
        background:transparent;
        text-decoration:none;
      }
    }
    .footer-pill.footer-text{
      cursor:default;
      user-select:none;
    }
    @media (hover: hover) and (pointer: fine){
      .footer-pill.footer-text:hover{
        color:#111;
        text-decoration:none;
      }
    }
    @media (max-width: 640px){
      .day.has-live{
        background:rgba(209,26,42,0.16);
        border:1px solid rgba(209,26,42,0.55);
      }
      .day .live-label{
        display:none;
      }
      .day.has-episode .dot{
        display:none;
      }
      /* Remove mobile tap flash/focus box on touch controls */
      button,
      [role="button"],
      input[type="range"]{
        -webkit-tap-highlight-color: transparent;
        outline: none;
        box-shadow: none;
      }
      button:focus,
      button:focus-visible,
      button:active,
      [role="button"]:focus,
      [role="button"]:focus-visible,
      [role="button"]:active,
      input[type="range"]:focus,
      input[type="range"]:focus-visible,
      input[type="range"]:active{
        outline: none;
        box-shadow: none;
      }
      .sound-bar{
        flex-wrap:wrap;
        justify-content:center;
        row-gap:10px;
        column-gap:8px;
        padding:12px 10px;
      }
      .sound-bar .progress-wrap{
        order:2;
        flex:0 0 100%;
        width:100%;
      }
      .sound-bar .play-btn{
        width:38px;
        height:38px;
      }
      .sound-bar .icon-btn,
      .sound-bar .volume-btn{
        padding:4px;
      }
      .sound-bar .time{
        font-size:0.8rem;
      }
    }
  </style>
</head>
<body>
  <h1><img class="site-logo" id="siteLogo" src="avaloncaferadiologo3.png" alt="Avalon Radio" /></h1>

  <div class="layout">
    <div class="month-image">
      <img id="monthImage" src="" alt="" />
    </div>

    <div class="calendar">
      <div class="cal-header">
        <button id="prevMonth">&lt; Prev</button>
        <span id="monthLabel"></span>
        <button id="nextMonth">Next &gt;</button>
      </div>
      <div class="dow">
        <div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div><div>Sun</div>
      </div>
      <div class="grid" id="calendarGrid"></div>
    </div>
  </div>

  <div class="player" id="episodePanel">
    <p class="episode-title" id="epTitle">No episode selected</p>
    <p class="episode-date" id="epDate"></p>
    <p class="episode-description" id="epDescription"></p>
    <p class="empty" id="epEmpty">Click on a highlighted day in the calendar to play that episode.</p>
    <audio id="audio" preload="auto" style="display:none"></audio>
    <div class="live-embed-wrap" id="liveEmbedWrap">
      <iframe
        id="liveEmbedFrame"
        title="Live stream"
        allow="autoplay; encrypted-media; picture-in-picture; fullscreen"
        referrerpolicy="strict-origin-when-cross-origin"
      ></iframe>
    </div>

    <div class="sound-bar" id="soundBar">
      <button type="button" class="icon-btn" id="sbPrev" title="Rewind 15s" aria-label="Rewind"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
      <button type="button" class="play-btn" id="sbPlay" title="Play" aria-label="Play"><svg id="sbPlayIcon" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg><svg id="sbPauseIcon" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg></button>
      <button type="button" class="icon-btn" id="sbNext" title="Forward 15s" aria-label="Forward"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zm2-12v12l5.5-6L8 6z"/></svg></button>
      <button type="button" class="icon-btn" id="sbShuffle" title="Shuffle" aria-label="Shuffle"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg></button>
      <button type="button" class="icon-btn" id="sbRepeat" title="Repeat" aria-label="Repeat"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg></button>
      <div class="progress-wrap">
        <span class="time" id="sbCurrent">0:00</span>
        <input type="range" class="progress-range" id="sbProgressRange" min="0" max="100" value="0" step="any" aria-label="Seek">
        <span class="time" id="sbTotal">0:00</span>
      </div>
      <button type="button" class="volume-btn" id="sbVolume" title="Volume" aria-label="Volume"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg></button>
    </div>
  </div>

  <script>
    let episodes = [];
    const episodesByDate = {};
    const today = new Date();
    let currentYear = today.getFullYear();
    let currentMonth = today.getMonth(); // 0-based

    const monthLabel = document.getElementById("monthLabel");
    const grid = document.getElementById("calendarGrid");
    const epTitle = document.getElementById("epTitle");
    const epDate = document.getElementById("epDate");
    const epDescription = document.getElementById("epDescription");
    const epEmpty = document.getElementById("epEmpty");
    const audio = document.getElementById("audio");
    const monthImage = document.getElementById("monthImage");
    const siteLogo = document.getElementById("siteLogo");
    const liveEmbedWrap = document.getElementById("liveEmbedWrap");
    const liveEmbedFrame = document.getElementById("liveEmbedFrame");
    const defaultEpisodePromptDesktop = "Click on a highlighted day in the calendar to play that episode.";
    const defaultEpisodePromptMobile = "Tap on a highlighted day in the calendar to play that episode.";

    // Live stream state (optional)
    let liveEnabled = false;
    let liveUrl = "";
    let isLiveMode = false; // true once we switch the <audio> src to the live stream
    let currentLiveKind = ""; // "youtube" or "audio"
    const defaultLogoSrc = "avaloncaferadiologo3.png";
    const liveLogoSrc = "avaloncaferadiologo2.png";

    const monthNames = ["January","February","March","April","May","June","July","August","September","October","November","December"];
    const monthKeys = ["january","february","march","april","may","june","july","august","september","october","november","december"];

    // Rainbow palette (7 traditional colors)
    const rainbowPalette = {
      red: { dot: "#ff2d2d", bg: "rgba(255,45,45,0.12)", border: "rgba(255,45,45,0.35)" },
      orange: { dot: "#ff8a00", bg: "rgba(255,138,0,0.12)", border: "rgba(255,138,0,0.35)" },
      yellow: { dot: "#ffd400", bg: "rgba(255,212,0,0.14)", border: "rgba(255,212,0,0.35)" },
      green: { dot: "#00a651", bg: "rgba(0,166,81,0.12)", border: "rgba(0,166,81,0.35)" },
      blue: { dot: "#3333ff", bg: "rgba(51,51,255,0.12)", border: "rgba(51,51,255,0.35)" },
      indigo: { dot: "#4b0082", bg: "rgba(75,0,130,0.12)", border: "rgba(75,0,130,0.35)" },
      violet: { dot: "#8a2be2", bg: "rgba(138,43,226,0.12)", border: "rgba(138,43,226,0.35)" }
    };

    function getEpisodePalette(color){
      const key = String(color || "blue").toLowerCase();
      return rainbowPalette[key] || rainbowPalette.blue;
    }

    function updateSiteLogoForLiveStatus(){
      if (!siteLogo) return;
      siteLogo.src = (liveEnabled && liveUrl) ? liveLogoSrc : defaultLogoSrc;
    }

    document.getElementById("prevMonth").addEventListener("click", () => {
      currentMonth--;
      if (currentMonth < 0) {
        currentMonth = 11;
        currentYear--;
      }
      renderCalendar();
      renderMonthImage();
    });

    document.getElementById("nextMonth").addEventListener("click", () => {
      currentMonth++;
      if (currentMonth > 11) {
        currentMonth = 0;
        currentYear++;
      }
      renderCalendar();
      renderMonthImage();
    });

    function dateKey(y, m, d){
      const mm = String(m + 1).padStart(2,"0");
      const dd = String(d).padStart(2,"0");
      return `${y}-${mm}-${dd}`;
    }

    function buildIndex(){
      episodesByDateClear();
      episodes.forEach(ep => {
        if (!ep.date || !ep.audioUrl) return;
        const existing = episodesByDate[ep.date];
        if (!existing){
          episodesByDate[ep.date] = ep;
          return;
        }
        // Prefer an episode that has a chosen color over one without,
        // so calendar dots don't fall back to default blue when multiple
        // episodes exist for the same date.
        const existingHasColor = existing.color != null && String(existing.color).trim() !== "";
        const newHasColor = ep.color != null && String(ep.color).trim() !== "";
        if (!existingHasColor && newHasColor){
          episodesByDate[ep.date] = ep;
          return;
        }
        if (existingHasColor && !newHasColor){
          return;
        }
        // If both have (or both don't have) a color, fall back to "last one wins".
        episodesByDate[ep.date] = ep;
      });
    }

    function episodesByDateClear(){
      for (const k in episodesByDate) delete episodesByDate[k];
    }

    function renderCalendar(){
      const first = new Date(currentYear, currentMonth, 1);
      const startWeekday = (first.getDay() + 6) % 7; // make Monday=0
      const daysInMonth = new Date(currentYear, currentMonth+1, 0).getDate();
      const prevMonthDays = new Date(currentYear, currentMonth, 0).getDate();

      monthLabel.textContent = `${monthNames[currentMonth]} ${currentYear}`;

      grid.innerHTML = "";
      const totalCells = 42; // 6 weeks

      for (let i=0;i<totalCells;i++){
        const cell = document.createElement("div");
        cell.className = "day";
        const dayNumber = document.createElement("div");
        dayNumber.className = "day-number";

        let inMonth = false;
        let d;

        if (i < startWeekday){
          d = prevMonthDays - (startWeekday - 1 - i);
        } else if (i >= startWeekday + daysInMonth){
          d = i - (startWeekday + daysInMonth) + 1;
        } else {
          d = i - startWeekday + 1;
          inMonth = true;
        }

        dayNumber.textContent = d;
        cell.appendChild(dayNumber);

        if (inMonth) {
          cell.classList.add("in-month");
          const key = dateKey(currentYear, currentMonth, d);
          const isTodayCell =
            currentYear === today.getFullYear() &&
            currentMonth === today.getMonth() &&
            d === today.getDate();

          if (isTodayCell) {
            cell.classList.add("today");
          }

          if (isTodayCell && liveEnabled && liveUrl) {
            cell.classList.add("has-live");
            const liveLabel = document.createElement("div");
            liveLabel.className = "live-label";
            liveLabel.textContent = "LIVE";
            cell.appendChild(liveLabel);
            cell.addEventListener("click", () => startLive(true));
            grid.appendChild(cell);
            continue;
          }

          const ep = episodesByDate[key];
          if (ep) {
            cell.classList.add("has-episode");
            const pal = getEpisodePalette(ep.color);
            cell.style.setProperty("--ep-dot", pal.dot);
            cell.style.setProperty("--ep-bg", pal.bg);
            cell.style.setProperty("--ep-border", pal.border);
            const dot = document.createElement("div");
            dot.className = "dot";
            cell.appendChild(dot);
            cell.addEventListener("click", () => selectEpisode(key));
          }
        }

        grid.appendChild(cell);
      }
    }

    function updateEpisodePromptForViewport(){
      const isPhone = window.matchMedia("(max-width: 640px)").matches;
      if (epEmpty && epEmpty.textContent.trim() === defaultEpisodePromptDesktop) {
        epEmpty.textContent = isPhone ? defaultEpisodePromptMobile : defaultEpisodePromptDesktop;
      } else if (epEmpty && epEmpty.textContent.trim() === defaultEpisodePromptMobile) {
        epEmpty.textContent = isPhone ? defaultEpisodePromptMobile : defaultEpisodePromptDesktop;
      }
    }

    function renderMonthImage(){
      const key = monthKeys[currentMonth];
      if (!key){
        monthImage.style.visibility = "hidden";
        monthImage.removeAttribute("src");
        return;
      }

      // Bust browser cache so removed/replaced month images update immediately after admin changes.
      const cacheBust = Date.now();
      const yearSpecific = `images/month-${currentYear}-${key}.jpg?t=${cacheBust}`;
      const generic = `images/month-${key}.jpg?t=${cacheBust}`;

      let triedFallback = false;

      monthImage.onload = () => {
        monthImage.style.visibility = "visible";
      };

      monthImage.onerror = () => {
        if (!triedFallback){
          triedFallback = true;
          monthImage.src = generic;
          return;
        }
        monthImage.style.visibility = "hidden";
        monthImage.removeAttribute("src");
      };

      monthImage.src = yearSpecific;
    }

    const soundBar = document.getElementById("soundBar");
    const sbPlay = document.getElementById("sbPlay");
    const sbPlayIcon = document.getElementById("sbPlayIcon");
    const sbPauseIcon = document.getElementById("sbPauseIcon");
    const sbCurrent = document.getElementById("sbCurrent");
    const sbTotal = document.getElementById("sbTotal");
    const sbProgressRange = document.getElementById("sbProgressRange");
    const sbPrev = document.getElementById("sbPrev");
    const sbNext = document.getElementById("sbNext");
    const sbShuffle = document.getElementById("sbShuffle");
    const sbRepeat = document.getElementById("sbRepeat");
    const liveOnlyDisabledButtons = [sbPrev, sbNext, sbShuffle, sbRepeat];

    function applyControlMode(){
      const live = isLiveMode || (liveEnabled && !audio.src);
      const youtubeLive = isLiveMode && currentLiveKind === "youtube";
      soundBar.classList.toggle("visible", !youtubeLive && (soundBar.classList.contains("visible") || live));
      sbProgressRange.disabled = live;
      soundBar.classList.toggle("live-mode", live);
      sbCurrent.classList.toggle("live-time", live);
      liveOnlyDisabledButtons.forEach((btn) => {
        if (!btn) return;
        btn.classList.toggle("disabled", live);
      });
    }

    function detectLiveKind(url){
      const u = String(url || "").toLowerCase();
      if (u.includes("youtube.com") || u.includes("youtu.be")) return "youtube";
      return "audio";
    }

    function extractYouTubeVideoId(url){
      try{
        const parsed = new URL(url);
        const host = parsed.hostname.toLowerCase();
        if (host.includes("youtu.be")) {
          const pathId = parsed.pathname.replace(/^\/+/, "").split("/")[0];
          return pathId || "";
        }
        if (host.includes("youtube.com")) {
          const v = parsed.searchParams.get("v");
          if (v) return v;
          const parts = parsed.pathname.split("/").filter(Boolean);
          if (parts[0] === "live" && parts[1]) return parts[1];
          if (parts[0] === "embed" && parts[1]) return parts[1];
        }
      } catch(_) {}
      return "";
    }

    function formatTime(seconds){
      if (!isFinite(seconds) || isNaN(seconds)) return "0:00";
      const m = Math.floor(seconds / 60);
      const s = Math.floor(seconds % 60);
      return `${m}:${String(s).padStart(2,"0")}`;
    }

    function updateSoundBarTime(){
      if (isLiveMode){
        sbCurrent.textContent = "LIVE";
        sbTotal.textContent = "";
        sbProgressRange.value = 0;
        sbProgressRange.style.setProperty("--pct", "0%");
        return;
      }

      const dur = audio.duration;
      const t = audio.currentTime;
      sbCurrent.textContent = formatTime(t);
      const pct = (dur && isFinite(dur) && dur > 0) ? (t / dur) * 100 : 0;
      const val = Math.max(0, Math.min(100, pct));
      sbProgressRange.value = val;
      sbProgressRange.style.setProperty("--pct", val + "%");
    }

    function tick(){
      if (!audio.paused) {
        if (isLiveMode) {
          updateSoundBarTime();
        } else if (audio.duration && isFinite(audio.duration)) {
        updateSoundBarTime();
        }
      }
      requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);

    function togglePlayback(){
      if (audio.paused) {
        if (!audio.src && liveEnabled && liveUrl) {
          startLive(true);
          if (isLiveMode && currentLiveKind === "youtube") return;
        }
        audio.play().catch(()=>{});
        return;
      }
      audio.pause();
    }

    sbPlay.addEventListener("click", (e) => {
      e.preventDefault();
      togglePlayback();
    });
    audio.addEventListener("play", () => {
      sbPlayIcon.style.display = "none";
      sbPauseIcon.style.display = "block";
    });
    audio.addEventListener("pause", () => {
      sbPlayIcon.style.display = "block";
      sbPauseIcon.style.display = "none";
    });
    audio.addEventListener("timeupdate", updateSoundBarTime);
    audio.addEventListener("loadedmetadata", function(){
      if (isLiveMode) return;
      const d = audio.duration;
      if (d && isFinite(d)) {
        sbTotal.textContent = formatTime(d);
      }
      sbProgressRange.style.setProperty("--pct", "0%");
    });
    audio.addEventListener("durationchange", function(){
      if (isLiveMode) return;
      const d = audio.duration;
      if (d && isFinite(d)) sbTotal.textContent = formatTime(d);
    });

    sbProgressRange.addEventListener("input", function(){
      if (isLiveMode) return;
      const dur = audio.duration;
      if (!dur || !isFinite(dur) || dur <= 0) return;
      const pct = Math.max(0, Math.min(1, parseFloat(sbProgressRange.value) / 100));
      const t = pct * dur;
      const wasPlaying = !audio.paused;
      audio.pause();
      audio.currentTime = t;
      sbCurrent.textContent = formatTime(t);
      sbProgressRange.style.setProperty("--pct", (pct * 100) + "%");
      if (wasPlaying) audio.play().catch(function(){});
    });

    sbPrev.addEventListener("click", (e) => {
      e.preventDefault();
      if (isLiveMode) return;
      audio.currentTime = Math.max(0, audio.currentTime - 15);
      updateSoundBarTime();
    });
    sbNext.addEventListener("click", (e) => {
      e.preventDefault();
      if (isLiveMode) return;
      audio.currentTime = Math.min(audio.duration || 0, audio.currentTime + 15);
      updateSoundBarTime();
    });
    sbRepeat.addEventListener("click", (e) => {
      e.preventDefault();
      if (isLiveMode) return;
      audio.loop = !audio.loop;
      sbRepeat.classList.toggle("active", audio.loop);
    });
    function getEpisodeDatesForCurrentMonth(){
      const mm = String(currentMonth + 1).padStart(2, "0");
      const yy = String(currentYear);
      return Object.keys(episodesByDate).filter((dateStr) => {
        if (!dateStr) return false;
        const parts = String(dateStr).split("-");
        if (parts.length !== 3) return false;
        return parts[0] === yy && parts[1] === mm;
      });
    }
    sbShuffle.addEventListener("click", (e) => {
      e.preventDefault();
      if (isLiveMode) return;
      const eligibleDates = getEpisodeDatesForCurrentMonth();
      if (!eligibleDates.length) return;

      const currentDate = epDate.textContent || "";
      let nextDate = eligibleDates[Math.floor(Math.random() * eligibleDates.length)];

      // If possible, avoid re-selecting the currently active date.
      if (eligibleDates.length > 1 && currentDate && eligibleDates.includes(currentDate)) {
        let tries = 0;
        while (nextDate === currentDate && tries < 8) {
          nextDate = eligibleDates[Math.floor(Math.random() * eligibleDates.length)];
          tries++;
        }
      }

      selectEpisode(nextDate);
    });
    const sbVolumeBtn = document.getElementById("sbVolume");
    sbVolumeBtn.addEventListener("click", (e) => {
      e.preventDefault();
      audio.muted = !audio.muted;
      sbVolumeBtn.classList.toggle("muted", audio.muted);
    });

    function isTypingTarget(target){
      if (!target) return false;
      const tag = (target.tagName || "").toLowerCase();
      if (target.isContentEditable) return true;
      return tag === "input" || tag === "textarea" || tag === "select";
    }

    // Keyboard controls (no visual changes):
    // Space/K = play-pause, arrows = seek, M = mute.
    document.addEventListener("keydown", (e) => {
      if (isTypingTarget(e.target)) return;

      if (e.code === "Space" || e.key === "k" || e.key === "K") {
        e.preventDefault();
        togglePlayback();
        return;
      }

      if (e.key === "ArrowLeft") {
        if (isLiveMode) return;
        e.preventDefault();
        audio.currentTime = Math.max(0, audio.currentTime - 15);
        updateSoundBarTime();
        return;
      }

      if (e.key === "ArrowRight") {
        if (isLiveMode) return;
        e.preventDefault();
        audio.currentTime = Math.min(audio.duration || 0, audio.currentTime + 15);
        updateSoundBarTime();
        return;
      }

      if (e.key === "m" || e.key === "M") {
        e.preventDefault();
        audio.muted = !audio.muted;
        sbVolumeBtn.classList.toggle("muted", audio.muted);
      }
    });

    function setLiveReadyUI(){
      if (!liveEnabled || !liveUrl) return;
      // Avoid overriding the UI if the user already picked an episode.
      if (audio.src) return;

      isLiveMode = false;
      currentLiveKind = detectLiveKind(liveUrl);
      sbProgressRange.value = 0;
      sbProgressRange.style.setProperty("--pct", "0%");

      epTitle.textContent = "Live stream";
      epDate.textContent = "";
      epDescription.textContent = "";
      epEmpty.textContent = currentLiveKind === "youtube"
        ? "Click LIVE on today to open YouTube Live."
        : "Press Play to start the live stream.";
      epEmpty.style.display = "block";

      sbCurrent.textContent = "LIVE";
      sbTotal.textContent = "";

      liveEmbedWrap.classList.remove("visible");
      liveEmbedFrame.src = "";
      soundBar.classList.add("visible");
      applyControlMode();
    }

    function startLive(autoplay){
      if (!liveEnabled || !liveUrl) return;
      currentLiveKind = detectLiveKind(liveUrl);

      isLiveMode = true;
      sbProgressRange.value = 0;
      sbProgressRange.style.setProperty("--pct", "0%");

      epTitle.textContent = "Live stream";
      epDate.textContent = "";
      epDescription.textContent = "";
      epEmpty.style.display = "none";

      sbCurrent.textContent = "LIVE";
      sbTotal.textContent = "";

      audio.loop = false;
      sbRepeat.classList.remove("active");

      if (currentLiveKind === "youtube"){
        const videoId = extractYouTubeVideoId(liveUrl);
        if (!videoId){
          epTitle.textContent = "Live stream unavailable";
          epDate.textContent = "";
          epDescription.textContent = "";
          epEmpty.textContent = "Could not parse the YouTube Live URL. Paste a full YouTube watch/live link in Admin.";
          epEmpty.style.display = "block";
          liveEmbedWrap.classList.remove("visible");
          liveEmbedFrame.src = "";
          isLiveMode = false;
          currentLiveKind = "";
          applyControlMode();
          return;
        }

        const autoplayParam = autoplay ? "1" : "0";
        liveEmbedFrame.src = `https://www.youtube.com/embed/${videoId}?autoplay=${autoplayParam}&playsinline=1`;
        liveEmbedWrap.classList.add("visible");
        soundBar.classList.remove("visible");
        audio.pause();
        audio.removeAttribute("src");
        audio.load();
        applyControlMode();
        return;
      }

      liveEmbedWrap.classList.remove("visible");
      liveEmbedFrame.src = "";
      audio.src = liveUrl;
      audio.style.display = "none";
      audio.load();
      soundBar.classList.add("visible");
      applyControlMode();
      if (autoplay) {
        audio.play().catch(() => {
          epTitle.textContent = "Live stream unavailable";
          epDate.textContent = "";
          epDescription.textContent = "";
          epEmpty.textContent = "Could not play this live URL. Check that it is a direct browser-playable stream.";
          epEmpty.style.display = "block";
        });
      }
    }

    function selectEpisode(dateStr){
      const ep = episodesByDate[dateStr];
      if (!ep) return;
      isLiveMode = false;
      currentLiveKind = "";
      audio.loop = false;
      sbRepeat.classList.remove("active");

      epTitle.textContent = ep.title || "Episode";
      epDate.textContent = dateStr;
      epDescription.textContent = ep.description || "";
      liveEmbedWrap.classList.remove("visible");
      liveEmbedFrame.src = "";
      audio.src = ep.audioUrl;
      audio.style.display = "none";
      epEmpty.style.display = "none";
      soundBar.classList.add("visible");
      sbCurrent.textContent = "0:00";
      sbTotal.textContent = "0:00";
      sbProgressRange.value = 0;
      sbProgressRange.style.setProperty("--pct", "0%");
      audio.load();
      applyControlMode();
      audio.play().catch(()=>{});
    }

    fetch(`/api/episodes?t=${Date.now()}`)
      .then(r => r.json())
      .then(data => {
        episodes = Array.isArray(data) ? data : [];
        buildIndex();
        renderCalendar();
        renderMonthImage();
      })
      .catch(() => {
        episodes = [];
        buildIndex();
        renderCalendar();
        renderMonthImage();
      });

    fetch(`/api/live-config?t=${Date.now()}`)
      .then(r => r.json())
      .then(cfg => {
        liveEnabled = !!cfg.enabled;
        liveUrl = (cfg.liveUrl || "").toString();
        updateSiteLogoForLiveStatus();
        if (liveEnabled && liveUrl) setLiveReadyUI();
        renderCalendar();
        applyControlMode();
      })
      .catch(() => {
        liveEnabled = false;
        liveUrl = "";
        updateSiteLogoForLiveStatus();
        renderCalendar();
        applyControlMode();
      });

    updateEpisodePromptForViewport();
    window.addEventListener("resize", updateEpisodePromptForViewport);
  </script>
